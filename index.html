<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZenStudy</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --secondary: #f0f0f0;
            --accent: #888888;
            --overlay: rgba(255, 255, 255, 0.9);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --secondary: #1a1a1a;
                --accent: #444444;
                --overlay: rgba(0, 0, 0, 0.9);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Navigation */
        .tab-content { 
            flex: 1; display: none; flex-direction: column; align-items: center; 
            padding-top: calc(60px + env(safe-area-inset-top)); 
            overflow-y: auto; width: 100%;
        }
        .active-tab { display: flex; }

        .bottom-nav {
            height: calc(70px + env(safe-area-inset-bottom));
            background: var(--bg); border-top: 1px solid var(--secondary);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 50;
        }
        .nav-item { background: none; border: none; color: var(--text); opacity: 0.3; font-size: 11px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; }

        /* Timer Styles */
        .timer-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        svg { position: absolute; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .bg-circle { stroke: var(--secondary); }
        .progress-circle { stroke: var(--text); stroke-dasharray: 754; transition: stroke-dashoffset 1s linear; }
        .timer-display { font-size: 64px; font-weight: 200; letter-spacing: -2px; }

        /* Progress Styles */
        .rank-card { width: 85%; max-width: 350px; background: var(--secondary); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .current-rank-name { font-size: 24px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
        .progress-bar-bg { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; margin: 15px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--text); width: 0%; transition: width 1s ease; }
        
        .rank-list { width: 85%; max-width: 350px; padding-bottom: 40px; }
        .rank-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--secondary); opacity: 0.3; font-size: 13px; }
        .rank-item.unlocked { opacity: 1; font-weight: 600; }

        /* Standard Elements */
        .main-btn { background: var(--text); color: var(--bg); border: none; padding: 14px 50px; font-size: 15px; font-weight: 600; border-radius: 30px; cursor: pointer; margin: 10px; }
        .session-header input { background: none; border: none; border-bottom: 1px solid var(--secondary); color: var(--text); text-align: center; font-size: 14px; width: 250px; padding: 8px; outline: none; text-transform: uppercase; }
        .task-section { width: 85%; max-width: 300px; margin-top: 20px; }
        #task-input { background: var(--secondary); border: none; color: var(--text); width: 100%; padding: 12px; border-radius: 10px; outline: none; }
        #task-list { list-style: none; padding: 0; }
        .task-item { padding: 10px 0; border-bottom: 1px solid var(--secondary); font-size: 14px; }
        .completed { text-decoration: line-through; opacity: 0.3; }

        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 100; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="settings-panel">
        <h2>Settings</h2>
        <div style="margin:10px">Focus: <input type="number" id="work-in" value="25" style="width:50px"></div>
        <button class="main-btn" onclick="toggleSettings()">Apply</button>
        <button id="auth-btn" style="background:none; border:none; text-decoration:underline; color:var(--text); margin-top:20px">Sign Out</button>
    </div>

    <div id="tab-timer" class="tab-content active-tab">
        <div class="session-header"><input type="text" id="session-name" placeholder="FOCUS GOAL"></div>
        <div class="timer-container">
            <svg width="240" height="240"><circle class="bg-circle" cx="120" cy="120" r="110"></circle><circle id="progress" class="progress-circle" cx="120" cy="120" r="110"></circle></svg>
            <div class="timer-display" id="timer-text">25:00</div>
        </div>
        <button class="main-btn" id="start-btn">START</button>
        <div class="task-section">
            <input type="text" id="task-input" placeholder="Add a task...">
            <ul id="task-list"></ul>
        </div>
    </div>

    <div id="tab-progress" class="tab-content">
        <div class="rank-card">
            <div id="rank-display-name" class="current-rank-name">SEEKER</div>
            <div style="font-size: 11px; opacity: 0.6;">TOTAL TIME: <span id="stat-total-mins">0</span> MINS</div>
            <div class="progress-bar-bg"><div id="rank-progress-fill" class="progress-bar-fill"></div></div>
            <div id="next-rank-info" style="font-size: 10px; opacity: 0.5;">250 MINS TO NEXT RANK</div>
        </div>
        
        <div class="rank-list" id="rank-trophy-room">
            </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('timer')">FOCUS</button>
        <button class="nav-item" onclick="switchTab('progress')">RANK</button>
        <button class="nav-item" onclick="toggleSettings()">SETTINGS</button>
    </div>

    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const RANKS = [
            { name: "SEEKER", min: 0 },
            { name: "APPRENTICE", min: 250 },
            { name: "PRACTITIONER", min: 1000 },
            { name: "SCHOLAR", min: 2500 },
            { name: "MASTER", min: 5000 },
            { name: "ENLIGHTENED", min: 10000 }
        ];

        let times = { work: 25 };
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let currentUser = null;

        // --- TAB SYSTEM ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            event.currentTarget.classList.add('active');
        };

        // --- AUTH ---
        document.getElementById('auth-btn').onclick = () => { !currentUser ? signInWithPopup(auth, provider) : signOut(auth); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadUserData();
            } else {
                currentUser = null;
                signInWithPopup(auth, provider);
            }
        });

        async function loadUserData() {
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            if (snap.exists()) {
                updateRankUI(snap.data().totalMinutes || 0);
            } else {
                await setDoc(doc(db, "users", currentUser.uid), { totalMinutes: 0 });
            }
        }

        function updateRankUI(totalMins) {
            let currentIdx = 0;
            for(let i=0; i<RANKS.length; i++) {
                if(totalMins >= RANKS[i].min) currentIdx = i;
            }

            const current = RANKS[currentIdx];
            const next = RANKS[currentIdx + 1] || null;

            document.getElementById('rank-display-name').textContent = current.name;
            document.getElementById('stat-total-mins').textContent = totalMins;

            if (next) {
                const diff = next.min - current.min;
                const progress = ((totalMins - current.min) / diff) * 100;
                document.getElementById('rank-progress-fill').style.width = `${progress}%`;
                document.getElementById('next-rank-info').textContent = `${next.min - totalMins} MINS TO ${next.name}`;
            } else {
                document.getElementById('rank-progress-fill').style.width = `100%`;
                document.getElementById('next-rank-info').textContent = "MAX RANK ACHIEVED";
            }

            // Render Trophy Room
            const room = document.getElementById('rank-trophy-room');
            room.innerHTML = '';
            RANKS.forEach(r => {
                const div = document.createElement('div');
                div.className = `rank-item ${totalMins >= r.min ? 'unlocked' : ''}`;
                div.innerHTML = `<span>${r.name}</span><span>${r.min}m</span>`;
                room.appendChild(div);
            });
        }

        // --- TIMER ---
        const circle = document.getElementById('progress');
        document.getElementById('start-btn').onclick = () => {
            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                document.getElementById('start-btn').textContent = "START";
            } else {
                isRunning = true;
                document.getElementById('start-btn').textContent = "PAUSE";
                timerId = setInterval(async () => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        document.getElementById('alarm').play();
                        await updateDoc(doc(db, "users", currentUser.uid), { totalMinutes: increment(parseInt(times.work)) });
                        loadUserData();
                        alert("Session complete");
                        resetTimer();
                    }
                }, 1000);
            }
        };

        function resetTimer() {
            timeLeft = times.work * 60;
            isRunning = false;
            document.getElementById('start-btn').textContent = "START";
            updateUI();
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-text').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            circle.style.strokeDashoffset = 754 - (timeLeft / (times.work * 60)) * 754;
        }

        // Tasks
        document.getElementById('task-input').onkeypress = (e) => {
            if(e.key === 'Enter' && e.target.value) {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.textContent = e.target.value;
                li.onclick = () => li.classList.toggle('completed');
                document.getElementById('task-list').prepend(li);
                e.target.value = '';
            }
        };

        window.toggleSettings = () => {
            const s = document.getElementById('settings-panel');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        };

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>

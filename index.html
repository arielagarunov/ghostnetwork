<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Quest: Chronicles</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --parchment: #f4e4bc; --ink: #2c1e14; --iron: #3d3d3d;
            --gold: #d4af37; --ruby: #a52a2a; --mana: #2a52a5;
        }
        [data-path="vampire"] { --accent: var(--ruby); --bg-tint: rgba(165, 42, 42, 0.1); }
        [data-path="elf"] { --accent: var(--mana); --bg-tint: rgba(42, 82, 165, 0.1); }
        [data-path="human"] { --accent: var(--iron); --bg-tint: rgba(0, 0, 0, 0.05); }

        body {
            background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--ink); font-family: 'Georgia', serif; margin: 0; overflow: hidden;
        }

        /* Layout */
        .scroll {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/parchment.png');
            width: 90%; max-width: 400px; margin: 20px auto; padding: 25px;
            border: 4px double var(--ink); border-radius: 5px; position: relative;
            height: 80vh; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .active-view { display: flex; }

        /* Tabs */
        .tab-bar {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            background: var(--iron); position: absolute; bottom: -50px; left: 0; width: 100%;
            border: 2px solid var(--gold); border-radius: 0 0 15px 15px;
        }
        .tab-btn {
            padding: 15px; color: #ddd; background: none; border: none;
            font-family: 'Georgia', serif; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .tab-btn.active { background: var(--gold); color: var(--ink); }

        /* RPG Elements */
        .stat-card { background: var(--bg-tint); border: 1px dashed var(--ink); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .btn-rpg {
            background: var(--iron); color: white; border: 2px solid var(--gold);
            padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .xp-bar { width: 100%; height: 12px; background: #3d1f0a; border: 1px solid var(--gold); overflow: hidden; margin: 10px 0; }
        .xp-fill { height: 100%; background: var(--gold); width: 0%; transition: 1s; }

        /* Timer Modal */
        #timerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #bigTimer { font-size: 6rem; color: var(--gold); font-family: monospace; margin: 20px 0; }

        /* Store */
        .store-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body data-path="human">

    <div id="authScreen" style="position:fixed; width:100%; height:100%; background:#1a1a1a; z-index:3000; display:flex; align-items:center; justify-content:center;">
        <div class="scroll" style="height:auto; text-align:center;">
            <h2>Identify Traveler</h2>
            <input type="email" id="email" placeholder="Email" style="width:80%; padding:10px; margin:10px;">
            <input type="password" id="password" placeholder="Password" style="width:80%; padding:10px; margin:10px;">
            <button class="btn-rpg" onclick="handleAuth()">Enter Realm</button>
        </div>
    </div>

    <div class="scroll">
        <div id="questView" class="view active-view">
            <h2 style="text-align:center; margin-top:0;">Quest Log</h2>
            <div class="stat-card">
                <p style="font-style:italic; margin:0;">"Choose thy burden and earn thy gold."</p>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;">
                    <button class="btn-rpg" style="padding:5px; font-size:0.6rem;" onclick="setMode(25, 5)">Skirmish</button>
                    <button class="btn-rpg" style="padding:5px; font-size:0.6rem;" onclick="setMode(50, 10)">Battle</button>
                    <button class="btn-rpg" style="padding:5px; font-size:0.6rem;" onclick="setMode(90, 15)">Crusade</button>
                </div>
            </div>
            <button class="btn-rpg" style="font-size:1.2rem; margin-top:auto;" onclick="openTimer()">Embark on Quest</button>
        </div>

        <div id="charView" class="view">
            <h2 style="text-align:center; margin-top:0;">Character</h2>
            <div class="stat-card">
                <span id="rankTitle" style="font-size:1.3rem; font-weight:900;">🌾 Peasant</span>
                <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
                <span id="xpText" style="font-size:0.7rem;">0 / 1000 XP</span>
            </div>
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between;">
                    <span>💰 Gold: <b id="goldText">0</b></span>
                    <span>🔥 Streak: <b id="streakText">1</b></span>
                </div>
            </div>
        </div>

        <div id="storeView" class="view">
            <h2 style="text-align:center; margin-top:0;">Black Market</h2>
            <div id="evolutionNotice" class="stat-card" style="display:none; border-color:var(--ruby);">
                <p style="font-weight:bold; margin:0; color:var(--ruby);">Evolution Available!</p>
                <div class="store-item">
                    <span>🧛 Vampire Blood</span>
                    <button class="btn-rpg" style="width:auto; padding:5px 10px;" onclick="buyClass('vampire')">2500 G</button>
                </div>
                <div class="store-item">
                    <span>🧝 Elven Essence</span>
                    <button class="btn-rpg" style="width:auto; padding:5px 10px;" onclick="buyClass('elf')">2500 G</button>
                </div>
            </div>
            <div class="stat-card">
                <p style="font-size:0.8rem;">More artifacts coming soon...</p>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="showTab('quest', this)">QUESTS</button>
            <button class="tab-btn" onclick="showTab('char', this)">HERO</button>
            <button class="tab-btn" onclick="showTab('store', this)">MARKET</button>
        </div>
    </div>

    <div id="timerOverlay">
        <h2 id="questStatus" style="color:white; letter-spacing:5px;">CHANNELING...</h2>
        <div id="bigTimer">25:00</div>
        <button class="btn-rpg" id="actionBtn" onclick="toggleTimer()">BEGIN</button>
        <button style="background:none; border:none; color:grey; margin-top:40px; cursor:pointer;" onclick="closeTimer()">ABANDON QUEST</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAuig-hearPfpRAYrLS21jVRszxhzI9V4",
            authDomain: "zenstudy-2fe64.firebaseapp.com",
            projectId: "zenstudy-2fe64",
            storageBucket: "zenstudy-2fe64.firebasestorage.app",
            messagingSenderId: "650684766921",
            appId: "1:650684766921:web:b445a2ddedce7bdcdfcb18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let workMins = 25, timeLeft = 1500, timerId = null, isWork = true;
        let userData = { xp: 0, gold: 0, path: 'human' };

        // Tab Navigation
        window.showTab = (tab, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'View').classList.add('active-view');
            btn.classList.add('active');
        };

        // Firebase Auth & Sync
        window.handleAuth = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    userData = snap.data();
                    document.body.setAttribute('data-path', userData.path || 'human');
                } else {
                    await setDoc(doc(db, "users", user.uid), { xp: 0, gold: 0, path: 'human' });
                }
                renderStats();
            }
        });

        // Store Logic
        window.buyClass = async (newPath) => {
            if(userData.gold >= 2500) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                    path: newPath, 
                    gold: increment(-2500) 
                });
                location.reload();
            } else { alert("Insufficient gold, peasant!"); }
        };

        // Timer Logic
        window.setMode = (w, b) => { workMins = w; timeLeft = w * 60; updateDisplay(); };
        window.openTimer = () => document.getElementById('timerOverlay').style.display = 'flex';
        window.closeTimer = () => { clearInterval(timerId); timerId = null; document.getElementById('timerOverlay').style.display = 'none'; };
        
        function updateDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('bigTimer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        window.toggleTimer = () => {
            if(timerId) { clearInterval(timerId); timerId = null; document.getElementById('actionBtn').textContent = "RESUME"; }
            else {
                document.getElementById('actionBtn').textContent = "SURVIVE";
                timerId = setInterval(() => {
                    if(timeLeft > 0) { timeLeft--; updateDisplay(); }
                    else { finishSession(); }
                }, 1000);
            }
        };

        async function finishSession() {
            clearInterval(timerId); timerId = null;
            if(isWork) {
                const g = workMins * 10;
                await updateDoc(doc(db, "users", auth.currentUser.uid), { xp: increment(workMins * 10), gold: increment(g) });
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: userData.path === 'vampire' ? ['#a52a2a'] : ['#d4af37'] });
                userData.xp += (workMins * 10); userData.gold += g;
            }
            isWork = !isWork; timeLeft = (isWork ? workMins : 5) * 60;
            document.getElementById('questStatus').textContent = isWork ? "CHANNELING..." : "RESTING...";
            updateDisplay(); renderStats();
        }

        function renderStats() {
            const xp = userData.xp, path = userData.path || 'human';
            let r = { t: "Peasant", i: "🌾", next: 1000 };

            if (xp < 5000) {
                if (xp >= 1000) r = { t: "Squire", i: "🛡️", next: 5000 };
            } else {
                if(path === 'human') {
                    document.getElementById('evolutionNotice').style.display = 'block';
                    r = { t: "Knight", i: "⚔️", next: 15000 };
                } else if(path === 'vampire') {
                    if(xp < 15000) r = { t: "Vampire", i: "🧛", next: 15000 };
                    else if(xp < 50000) r = { t: "Highborne", i: "🩸", next: 50000 };
                    else r = { t: "Vampire King", i: "🏰", next: 100000 };
                } else if(path === 'elf') {
                    if(xp < 15000) r = { t: "Elf", i: "🧝", next: 15000 };
                    else if(xp < 50000) r = { t: "Wizard", i: "🪄", next: 50000 };
                    else r = { t: "Grandwizard", i: "☄️", next: 100000 };
                }
            }

            document.getElementById('rankTitle').textContent = `${r.i} ${r.t}`;
            document.getElementById('goldText').textContent = userData.gold;
            document.getElementById('xpText').textContent = `${xp} / ${r.next} XP`;
            document.getElementById('xpFill').style.width = ((xp - (r.min || 0)) / (r.next - (r.min || 0)) * 100) + "%";
        }
    </script>
</body>
</html>

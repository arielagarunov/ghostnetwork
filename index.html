<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pomodoro</title>
    <style>
        :root {
            --bg-color: #ba4949; 
            --button-color: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Settings Panel */
        #settings-panel {
            display: none;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-group input {
            width: 50px;
            padding: 5px;
            border-radius: 4px;
            border: none;
            text-align: center;
        }

        /* Timer UI */
        .timer-display {
            font-size: 100px;
            font-weight: bold;
            margin: 20px 0;
        }

        .controls button, .save-btn {
            background: white;
            color: var(--bg-color);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0px 6px #ebebeb;
            transition: all 0.1s;
        }

        .controls button:active {
            box-shadow: none;
            transform: translateY(6px);
        }

        .modes button, .settings-toggle {
            background: none;
            border: none;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
            border-radius: 4px;
        }

        .modes button.active {
            background: var(--button-color);
            font-weight: bold;
            opacity: 1;
        }

        .settings-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
        }

    </style>
</head>
<body>

<button class="settings-toggle" onclick="toggleSettings()">⚙️</button>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div class="container">
    <div id="settings-panel">
        <h3 style="margin-top: 0;">Timer Settings (mins)</h3>
        <div class="setting-group">
            <label>Pomodoro</label>
            <input type="number" id="work-input" value="25">
        </div>
        <div class="setting-group">
            <label>Short Break</label>
            <input type="number" id="short-input" value="5">
        </div>
        <div class="setting-group">
            <label>Long Break</label>
            <input type="number" id="long-input" value="15">
        </div>
        <button class="save-btn" style="padding: 5px 20px; font-size: 14px;" onclick="saveSettings()">Apply</button>
    </div>

    <div class="modes">
        <button onclick="setMode('work')" id="work-btn" class="active">Pomodoro</button>
        <button onclick="setMode('short')" id="short-btn">Short Break</button>
        <button onclick="setMode('long')" id="long-btn">Long Break</button>
    </div>

    <div class="timer-display" id="timer">25:00</div>

    <div class="controls">
        <button onclick="toggleTimer()" id="start-btn">Start</button>
    </div>
</div>

<script>
    const themes = {
        work: { time: 25 * 60, color: '#ba4949' },
        short: { time: 5 * 60, color: '#38858a' },
        long: { time: 15 * 60, color: '#397097' }
    };

    let timeLeft = themes.work.time;
    let timerId = null;
    let isRunning = false;
    let currentMode = 'work';

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const alarm = document.getElementById('alarm-sound');

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const formatted = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        timerDisplay.textContent = formatted;
        document.title = `${formatted} - Focus!`;
    }

    function setMode(mode) {
        currentMode = mode;
        timeLeft = themes[mode].time;
        document.documentElement.style.setProperty('--bg-color', themes[mode].color);
        startBtn.style.color = themes[mode].color;

        document.querySelectorAll('.modes button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`${mode}-btn`).classList.add('active');

        stopTimer();
        updateDisplay();
    }

    function toggleTimer() {
        isRunning ? stopTimer() : startTimer();
    }

    function startTimer() {
        isRunning = true;
        startBtn.textContent = "Pause";
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerId);
                alarm.play();
                stopTimer();
            }
        }, 1000);
    }

    function stopTimer() {
        isRunning = false;
        startBtn.textContent = "Start";
        clearInterval(timerId);
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        themes.work.time = document.getElementById('work-input').value * 60;
        themes.short.time = document.getElementById('short-input').value * 60;
        themes.long.time = document.getElementById('long-input').value * 60;
        
        setMode(currentMode); // Refresh current timer
        toggleSettings(); // Hide panel
    }

    // Init
    startBtn.style.color = themes.work.color;
</script>

</body>
</html>
